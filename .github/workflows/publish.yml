name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'package.json' # 只有 package.json 改动才可能是版本更新
    tags:
      - 'v*.*.*' # 保留：推送 tag 也可以触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 拉两个 commit 用于对比版本号

      - name: Check version changed
        id: version_check
        if: github.ref == 'refs/heads/main'
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "0.0.0")
          CURR=$(node -p "require('./package.json').version")
          echo "prev=$PREV, curr=$CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip publish (version unchanged)
        if: github.ref == 'refs/heads/main' && steps.version_check.outputs.changed != 'true'
        run: echo "Version unchanged ($CURR), skipping publish."

      - name: Setup Node.js
        if: github.ref != 'refs/heads/main' || steps.version_check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        if: github.ref != 'refs/heads/main' || steps.version_check.outputs.changed == 'true'
        run: npm ci

      - name: Publish Extension
        if: github.ref != 'refs/heads/main' || steps.version_check.outputs.changed == 'true'
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
